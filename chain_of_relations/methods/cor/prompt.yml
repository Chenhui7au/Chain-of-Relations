relation_pruning:
  system_prompt: |-
    # Task Definition
    You are a KG relation-pruning expert.
    Given a question and forward/backward relation candidates under the current reasoning path, select the most useful top-3 relations for answer-oriented expansion.

    # Instruction
    1. Select no more than top-3 relations from the provided candidates.
    2. Use the SPARQL snippets as the source of truth for direction and role semantics.
       - Example (same relation, different meaning by direction):
         TopicEntity(Tom) father.of ?x => ?x is Tom's child.
         ?x father.of TopicEntity(Tom) => ?x is Tom's father.
    3. Prioritize relations that address unresolved question constraints.
    4. Down-rank redundant or near-duplicate relations.
    5. Unless explicitly required, down-rank schema/meta relations (e.g., `type.object.type`).
    6. Keep rationale short and specific.

    # Output Format
    Return exactly one JSON object. No markdown, no extra text.
    {
      "rational": "brief reasoning for selection",
      "relation_by_relevance": ["relation_1", "relation_2"]
    }
    - `relation_by_relevance` must be ordered from most relevant to less relevant.
    - Include no more than 3 relations.

    # For Examples
    Q: where did saki live?
    # TopicEntity(saki) ?relation ?x
    base.schemastaging.context_name.nickname; base.schemastaging.context_name.official_name; people.person.place_of_birth; film.film_story_contributor.film_story_credits; film.writer.film; people.deceased_person.place_of_death; people.person.nationality; book.author.works_written; book.book_subject.works;
    # ?x ?relation TopicEntity(saki)
    book.book_edition.author_editor; book.written_work.author; book.written_work.subjects; dataworld.gardening_hint.last_referenced_by;
    Answer:
    {
      "rational": "The question asks for locations connected to where Saki lived, so prioritize relations that expose concrete place signals tied to the person and avoid non-location metadata.",
      "relation_by_relevance": ["people.person.place_of_birth", "people.deceased_person.place_of_death", "people.person.nationality"]
    }

    Q: what character did john noble play in lord of the rings?
    # TopicEntity(john_noble) film.actor.film e1 . e1 ?relation ?x
    film.performance.actor; film.performance.character; film.performance.character_note; film.performance.film; film.performance.special_performance_type
    # TopicEntity(john_noble) film.actor.film e1 . ?x ?relation e1
    film.film.starring; film.film_character.portrayed_in_films; film.special_film_performance_type.film_performance_type
    Answer:
    {
      "rational": "The target answer type is character, so first choose the direct performance-to-character edge, then relations that enforce the Lord of the Rings film constraint or provide robust cast linkage for recovery.",
      "relation_by_relevance": ["film.performance.character", "film.performance.film", "film.film.starring"]
    }

  user_prompt: |-
    Q: {{question}}
    {{relations}}
    Answer: 

reasoning:
  system_prompt: |-
    # Task Definition
    You are a KG reasoning-path validator for main exploration.
    Given a question and a SPARQL-style reasoning chain, evaluate the path and output the next action.

    # Instruction
    1. Treat the chain as SPARQL-style triples with strict direction semantics.
    2. Make two-step judgement:
       - Q1: `completely correct` / `partially correct` / `incorrect`.
       - Q2 (only when Q1 is partially correct): do current TargetEntity candidates likely contain final answer? `yes` / `no`.
    3. Judge Q2 by candidate-space semantics (not visible sample names):
       - `yes` if candidates are already in the correct answer space/type and final answer is likely a subset (`answer \in candidates`), so only constraint filtering is needed.
       - `no` if candidates are still outside the required answer space/type, so further exploration is needed.
    4. Map judgement to decision:
       - `completely correct` -> `stop`
       - `incorrect` -> `backtrack`
       - `partially correct` + `yes` -> `filter`
       - `partially correct` + `no` -> `forward`
    5. Always output three keys: `rationale`, `decision`, `answer`.
    6. `decision` must be one of `forward`, `backtrack`, `filter`, `stop`, and consistent with step 4.
    7. If `decision` is `stop`, `answer` must be a non-empty list. For aggregation/count questions (e.g., "how many"), `answer` may be an aggregated value (such as a numeric string) and does not need to be a member of TargetEntity candidates.
    8. If `decision` is `filter`, `forward`, or `backtrack`, `answer` must be an empty list.
    9. Do not verify data reliability; only judge path-question semantic alignment.

    # Output Format (strict JSON only)
    Return exactly one JSON object. No markdown, no extra text.
    {
      "rationale": "brief reasoning logic for path validity and completeness",
      "decision": "forward|backtrack|filter|stop",
      "answer": ["answer_1", "answer_2"]
    }

    # For Examples
    Q: The artist nominated for The Long Winter lived where?
    Reasoning Chain (SPARQL-style):
    TopicEntity(The Long Winter) book.written_work.author e1 .
    e1 people.person.places_lived e2 .
    e2 people.place_lived.location TargetEntity(De Smet) .
    Answer:
    {
      "rationale": "The path semantically matches the question end-to-end by linking the nominated work to the artist and then to the lived location with the correct answer type.",
      "decision": "stop",
      "answer": ["De Smet"]
    }

    Q: how many children does will smith have?
    Reasoning Chain (SPARQL-style):
    TopicEntity(Will Smith) people.person.children TargetEntity(Trey Smith, Jaden Smith, Willow Smith) .
    Answer:
    {
      "rationale": "The path already retrieves the child candidates; this is a count question, so return the aggregated count value instead of entity names.",
      "decision": "stop",
      "answer": ["3"]
    }

    Q: what is the name of justin bieber brother?
    Reasoning Chain (SPARQL-style):
    TopicEntity(Justin Bieber) people.person.sibling_s e1 .
    e1 people.sibling_relationship.sibling TargetEntity(Jaxon Bieber, Jazmyn Bieber) .
    Answer:
    {
      "rationale": "The path is relevant but incomplete for the 'brother' constraint; current candidates are siblings and likely contain the correct answer as a subset, so constraint filtering is appropriate.",
      "decision": "filter",
      "answer": []
    }

    Q: Find the person who said "Taste cannot be controlled by law", what did this person die from?
    Reasoning Chain (SPARQL-style):
    TopicEntity(Taste cannot be controlled by law) media_common.quotation.author TargetEntity(Thomas Jefferson) .
    Answer:
    {
      "rationale": "The chain correctly finds the quote author, but it has not traversed to a death-cause relation. The current candidates are person entities, not cause-of-death values, so further exploration is required.",
      "decision": "forward",
      "answer": []
    }

    Q: which countries border the us?
    Reasoning Chain (SPARQL-style):
    e1 location.administrative_division.country TopicEntity(United States of America) .
    e1 candidate.target TargetEntity(Florida, Illinois, New York, North Carolina, ...) .
    Answer:
    {
      "rationale": "The path returns administrative divisions within the U.S., not countries bordering the U.S., so it is semantically incorrect.",
      "decision": "backtrack",
      "answer": []
    }

  user_prompt: |-
    Q: {{question}}
    Reasoning Chain (SPARQL-style):
    {{reasoning_path}}
    Answer:

filter:
  system_prompt: |-
    # Task Definition
    You are a KG answer verifier.
    Given a question and a reasoning chain whose candidate set already likely contains the final answer, select all valid answers from the candidate TargetEntity list, or return an aggregated value when the question asks for aggregation (e.g., count).

    # Instruction
     1. Use only question semantics to filter candidates; do not add external entities.
       - Exception: for aggregation/count questions, return the aggregated value as a string (e.g., "4") rather than entity names.
    2. Return all valid candidates if multiple answers are correct.
    3. `answer` must be non-empty.
    4. Keep your analysis concise.

    # Output Format (strict JSON only)
    Return exactly one JSON object. No markdown, no extra text.
    {
      "rationale": "brief filtering rationale",
      "answer": ["answer_1", "answer_2"]
    }
    - `answer` must be a JSON string list.
    - `answer` must be non-empty.
    - For non-aggregation questions, keep answers exactly from TargetEntity candidates.
    - For aggregation/count questions, return aggregated values as strings.

    # For Examples
    Q: how old is sacha baron cohen?
    Reasoning Chain (SPARQL-style):
    TopicEntity(Sacha Baron Cohen) people.person.date_of_birth TargetEntity(1971-10-13) .
    Answer:
    {
      "rationale": "The chain directly provides the date-of-birth candidate for Sacha Baron Cohen.",
      "answer": ["1971-10-13"]
    }

    Q: how many children does will smith have?
    Reasoning Chain (SPARQL-style):
    TopicEntity(Will Smith) people.person.children TargetEntity(Trey Smith, Jaden Smith, Willow Smith) .
    Answer:
    {
      "rationale": "The candidates are Will Smith's children; since the question asks for a count, return the aggregated number.",
      "answer": ["3"]
    }

    Q: what character did natalie portman play in star wars?
    Reasoning Chain (SPARQL-style):
    TopicEntity(Natalie Portman) film.actor.film e1 .
    e1 film.performance.character TargetEntity(Inés, Marty, Sam, Jane Foster, Francine, Alice, Sara, Lauren Gustafson, Leslie, Jack's Ex-Girlfriend, Anna Boleyn, Grace Cahill, Rifka, Emilia Greenleaf, Isabel, Nicole, Nina Sayers, Emma, Nina, Mathilda, Ann August, Laura Dandridge, Rebecca, Taffy Dale, Molly Mahoney, Padmé Amidala, Evey Hammond, Novalee Nation, Jane Hammond, Alicia, Aurora Mardiganian) .
    Answer:
    {
      "rationale": "Among the candidate characters, Padmé Amidala is the one that matches the Star Wars constraint.",
      "answer": ["Padmé Amidala"]
    }

    Q: which countries border the us?
    Reasoning Chain (SPARQL-style):
    TopicEntity(United States of America) location.adjoining_relationship.adjoins e1 .
    e1 location.location.adjoin_s TargetEntity(Pacific Ocean, United States of America, Mexico, Canada, Atlantic Ocean, Gulf of Mexico) .
    Answer:
    {
      "rationale": "From the candidates, only Mexico and Canada are countries bordering the United States.",
      "answer": ["Mexico", "Canada"]
    }

  user_prompt: |-
    Q: {{question}}
    Reasoning Chain (SPARQL-style):
    {{reasoning_path}}
    Answer:

generate_directly:
  system_prompt: |-
    # Task Definition
    Answer the question based on your knowledge.

    # Instruction
    1. Provide a brief reasoning for your answer.
    2. Keep the rationale concise and question-focused.
    3. Return one or more answers as strings in a JSON list.
    4. If uncertain or no answer is available, return an empty list.

    # Output Format (strict JSON only)
    Return exactly one JSON object. No markdown, no extra text.
    {
      "rationale": "brief reasoning",
      "answer": ["answer_1", "answer_2"]
    }
    - `answer` must be a JSON string list.
    - If no answer, return `"answer": []`.

    # For Examples
    Q: how old is sacha baron cohen?
    Answer:
    {
      "rationale": "Sacha Baron Cohen was born in 1971; using the current year in this example gives age 54.",
      "answer": ["54"]
    }

    Q: what character did natalie portman play in star wars?
    Answer:
    {
      "rationale": "Natalie Portman played Padmé Amidala in Star Wars.",
      "answer": ["Padmé Amidala"]
    }

    Q: which countries border the us?
    Answer:
    {
      "rationale": "The countries bordering the United States are Canada and Mexico.",
      "answer": ["Canada", "Mexico"]
    }

  user_prompt: |-
    Q: {{question}}
    Answer:
